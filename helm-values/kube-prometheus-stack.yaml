fullnameOverride: prometheus
prometheus:
  prometheusSpec:
    externalUrl: https://${thanos_hostname}
    externalLabels:
      cluster: "${cluster_name}"
    disableCompaction: true
    retention: 6h
    resources:
      requests:
        memory: 1Gi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    thanos:
      objectStorageConfig:
        existingSecret:
          name: ${thanos_objconfig_secret_name}
          key: thanos.yml
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
alertmanager:
  config:
    route:
      group_by:
      - namespace
      routes: 
      - receiver: 'null'
        matchers:
        - alertname = "KubeletTooManyPods"
    receivers:
    - name: 'null'
  route:
    main:
      enabled: true
      hostnames:
      - ${alertmanager_hostname}
      parentRefs:
      - name: ${gateway_name}
        namespace: ${gateway_namespace}
        sectionName: ${gateway_listener}
grafana:
  adminPassword: admin
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  sidecar:
    datasources:
      name: Thanos
      uid: thanos
      url: http://thanos-query.monitoring.svc.cluster.local:9090
  additionalDataSources:
  - name: loki
    type: loki
    url: http://loki-gateway.logging.svc.cluster.local
  - name: tempo
    type: tempo
    url: http://tempo-query-frontend.tracing.svc.cluster.local:3200
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      gateway-api-gatewayclasses:
        gnetId: 19432
        revision: 1
      gateway-api-gateways:
        gnetId: 19433
        revision: 1
      gateway-api-httproutes:
        gnetId: 19434
        revision: 1
      karpenter-capacity-dashboard:
        url: https://karpenter.sh/v1.12/getting-started/getting-started-with-karpenter/karpenter-capacity-dashboard.json
      karpenter-performance-dashboard:
        url: https://karpenter.sh/v1.12/getting-started/getting-started-with-karpenter/karpenter-performance-dashboard.json
      envoy-clusters:
        url: https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-addons-helm/dashboards/envoy-clusters.json
      envoy-proxy-global:
        url: https://raw.githubusercontent.com/envoyproxy/gateway/refs/heads/main/charts/gateway-addons-helm/dashboards/envoy-proxy-global.json
  route:
    main:
      enabled: true
      hostnames:
      - ${grafana_hostname}
      parentRefs:
      - name: ${gateway_name}
        namespace: ${gateway_namespace}
        sectionName: ${gateway_listener}
prometheus-node-exporter:
  prometheus:
    monitor:
      relabelings:
      - sourceLabels: [__meta_kubernetes_pod_node_name]
        action: replace
        targetLabel: instance
      attachMetadata:
        node: true
  priorityClassName: system-node-critical
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: eks.amazonaws.com/compute-type
              operator: NotIn
              values:
                - fargate
kube-state-metrics:
  customResourceState:
    enabled: true
    config:
      kind: CustomResourceStateMetrics
      spec:
        resources:
          - groupVersionKind:
              group: gateway.networking.k8s.io
              kind: "Gateway"
              version: "v1"
            metricNamePrefix: gatewayapi_gateway
            labelsFromPath:
              name:
                - metadata
                - name
              namespace:
                - metadata
                - namespace
            metrics:
              - name: "info"
                help: "Gateway information"
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      gatewayclass_name: [ spec, gatewayClassName ]
              - name: "labels"
                help: "Kubernetes labels converted to Prometheus labels."
                each:
                  type: Info
                  info:
                    path: [ metadata ]
                    labelsFromPath:
                      "*": [ labels ]
              - name: "created"
                help: "created timestamp"
                each:
                  type: Gauge
                  gauge:
                    path: [ metadata, creationTimestamp ]
              - name: "deleted"
                help: "deletion timestamp"
                each:
                  type: Gauge
                  gauge:
                    path: [ metadata, deletionTimestamp ]
              - name: "listener_info"
                help: "Gateway listener information"
                each:
                  type: Info
                  info:
                    path: [ spec, listeners ]
                    labelsFromPath:
                      listener_name: [ "name" ]
                      port: [ "port" ]
                      protocol: [ "protocol" ]
                      hostname: [ "hostname" ]
                      tls_mode: [ "tls","mode" ]
                      allowed_routes_namespaces_from: [ "allowedRoutes", "namespaces", "from" ]
              - name: "status"
                help: "status condition"
                each:
                  type: Gauge
                  gauge:
                    path: [ status, conditions ]
                    labelsFromPath:
                      type: [ "type" ]
                    valueFrom: [ "status" ]
              - name: "status_listener_attached_routes"
                help: "Number of attached routes for a listener"
                each:
                  type: Gauge
                  gauge:
                    path: [ status, listeners ]
                    labelsFromPath:
                      listener_name: [ "name" ]
                    valueFrom: [ "attachedRoutes" ]
              - name: "status_address_info"
                help: "Gateway address types and values"
                each:
                  type: Info
                  info:
                    path: [ status, addresses ]
                    labelsFromPath:
                      type: [ "type" ]
                      value: [ "value" ]
